name: workflow_dispatch1
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm i
      
      - name: Build project
        run: npm run build
      
      - name: Uploading artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build-artifact
          path: ./dist 
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download a Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./dist 

      - name: Install dependencies
        run: npm ci
      
      - name: Run Tests
        run: npm run test -- --watchAll=false
      
      - name: Validate Build output
        run: |
          test -f ./dist/index.html
          echo "build file exists"


  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    # Only deploy on pushes to main or dev, not for every PR check
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./dist 

      - name: Build And Deploy to Azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_ROCK_0CC650D1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### Configuration ######
          app_location: "/"          # The root of your repo
          api_location: ""           # No API for this React app
          output_location: "dist"    # Where the index.html is located
